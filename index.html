<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatrix - Anonymous Random Chat</title>
    <link rel="icon" type="image/png" href="/logo.png">
    
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-[#2C2C2C] font-sans antialiased overflow-hidden">

    <div id="app" class="h-screen w-full flex flex-col relative z-10">
        
        <!-- SECTION 1: LANDING PAGE -->
        <div id="landing" class="flex flex-col items-center flex-1 bg-white relative bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-fixed overflow-y-auto chat-scroll">
            
            <div class="bg-objects-container pointer-events-none overflow-hidden select-none">
                <div class="cube animate-float-3d opacity-45 top-10 left-[10%]" style="animation-duration: 18s;"></div>
                <div class="sphere animate-float-3d opacity-35 top-[30%] right-[10%]" style="animation-delay: 2s; animation-duration: 22s;"></div>
                <div class="cube animate-float-3d opacity-35 bottom-32 left-[18%]" style="animation-delay: 5s; animation-duration: 28s;"></div>
                <div class="sphere animate-float-3d opacity-40 bottom-40 right-[25%]" style="animation-delay: 1s; animation-duration: 20s;"></div>
            </div>

            <div class="absolute top-6 left-6 md:top-12 md:left-12 z-20 flex items-center gap-2 group cursor-default">
                <img src="/logo.png" alt="Chatrix" class="w-16 h-16 md:w-32 md:h-32 object-contain transition-transform group-hover:scale-105 drop-shadow-2xl">
                <div class="flex flex-col justify-center translate-y-1">
                    <span class="font-black text-2xl md:text-5xl tracking-tighter leading-none">CHATRIX</span>
                    <span class="text-[8px] md:text-[11px] font-black uppercase tracking-[0.45em] text-[#DAA520] mt-1 md:mt-1.5 opacity-80">Anonymous Chat</span>
                </div>
            </div>

            <div class="max-w-4xl w-full min-h-screen flex flex-col items-center justify-center p-6 shrink-0 pt-32 md:pt-0">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center w-full py-20 relative z-10">
                    <div class="space-y-12 text-center md:text-left flex flex-col items-center md:items-start">
                        <div class="inline-flex items-center gap-3 bg-[#FFF8DC] px-5 py-2 rounded-full border border-[#FFD700]">
                             <img src="/logo.png" alt="Logo" class="w-5 h-5 object-contain">
                             <span class="text-xs font-black tracking-[0.3rem] uppercase text-[#B8860B]">Elite Anonymous Chat</span>
                        </div>
                        <h1 class="text-6xl md:text-[7rem] font-black tracking-tight leading-none">
                            CHATRIX
                            <span class="block h-2 w-32 bg-[#FFD700] mt-4 rounded-full mx-auto md:mx-0"></span>
                        </h1>
                        <p class="text-[#2C2C2C]/60 text-xl font-medium leading-relaxed max-w-sm italic">
                            Connect effortlessly. Borderless, instant, and completely anonymous.
                        </p>
                        <button onclick="handleStart()" class="group relative flex justify-center py-4 md:py-6 px-8 md:px-10 rounded-2xl md:rounded-3xl text-white bg-gradient-to-r from-[#FFD700] to-[#DAA520] border-b-[6px] md:border-b-[8px] border-[#B8860B] hover:translate-y-[-2px] hover:border-b-[10px] active:translate-y-[4px] active:border-b-0 text-xl md:text-2xl font-black uppercase transition-all shadow-xl min-w-[200px] md:min-w-[240px]">
                            Start Chat
                        </button>
                    </div>

                    <div class="flex justify-center relative mt-20 md:mt-0">
                        <div class="w-80 h-96 bg-white/40 rounded-[3rem] border-4 border-[#FFD700]/20 relative p-8 shadow-2xl backdrop-blur-xl">
                             <div class="grid grid-cols-3 gap-8">
                                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center border-2 border-[#FFF8DC] shadow-sm text-[#DAA520]">💬</div>
                                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center border-2 border-[#FFF8DC] shadow-sm text-[#DAA520]">🛡️</div>
                                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center border-2 border-[#FFF8DC] shadow-sm text-[#DAA520]">⚡</div>
                                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center border-2 border-[#FFF8DC] shadow-sm text-[#DAA520]">🌐</div>
                                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center border-2 border-[#FFF8DC] shadow-sm text-[#DAA520]">📱</div>
                                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center border-2 border-[#FFF8DC] shadow-sm text-[#DAA520]">👥</div>
                             </div>
                             <div class="absolute -top-6 -right-6 w-20 h-20 bg-gradient-to-br from-[#FFD700] to-[#DAA520] rounded-full border-4 border-white flex items-center justify-center shadow-xl animate-bounce text-white font-black text-2xl">!</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SECTION 2: THE CHAT ROOM (Hidden by default) -->
        <div id="chat-view" class="hidden flex-col h-screen max-w-4xl mx-auto w-full bg-white md:border-x border-[#FFD700]/10 relative overflow-hidden shadow-2xl">
            <!-- Header -->
            <header class="h-20 md:h-24 border-b border-[#FFD700]/20 flex items-center justify-between px-4 md:px-10 bg-white/90 backdrop-blur-3xl z-10 shadow-sm">
                <div class="flex items-center gap-2">
                    <img src="/logo.png" alt="Chatrix" class="w-10 h-10 md:w-16 md:h-16 object-contain p-0.5 md:p-1">
                    <div class="flex flex-col translate-y-0.5">
                        <span class="font-black text-xl md:text-3xl tracking-tight uppercase leading-none">CHATRIX</span>
                        <span class="text-[8px] md:text-[10px] text-[#DAA520] font-black uppercase tracking-[0.25em] mt-1 md:mt-1.5 leading-none">Established 2024</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 md:gap-5">
                    <button onclick="handleNext()" class="bg-[#FFD700] hover:bg-[#DAA520] text-white font-black px-4 md:px-8 py-2 md:py-3.5 rounded-xl md:rounded-2xl text-[10px] md:text-sm transition-all flex items-center gap-2 border-b-2 md:border-b-4 border-[#B8860B] active:translate-y-[2px] active:border-b-0 uppercase tracking-widest">Next</button>
                    <button onclick="handleStop()" class="bg-white hover:bg-red-50 text-red-500 font-bold px-3 md:px-6 py-2 md:py-3.5 rounded-xl md:rounded-2xl text-[10px] md:text-sm transition-all flex items-center gap-2 shadow-sm uppercase border border-red-100 active:scale-95">Stop</button>
                </div>
            </header>

            <!-- Messages Area -->
            <main id="messages-container" class="flex-1 overflow-y-auto p-8 md:p-14 chat-scroll space-y-8 bg-white/50 relative">
                <!-- Searching Loader -->
                <div id="searching-loader" class="flex flex-col items-center justify-center h-full space-y-12 text-center">
                    <div class="relative group">
                        <div class="absolute inset-0 bg-[#FFD700]/20 rounded-full blur-3xl animate-pulse"></div>
                        <div class="w-20 h-20 border-8 border-gray-100 border-t-[#DAA520] rounded-full animate-spin"></div>
                    </div>
                    <p class="font-black text-xl md:text-3xl uppercase tracking-[0.2em] md:tracking-[0.4em]">Curating...</p>
                </div>
                <div id="messages-list" class="space-y-8"></div>
            </main>

            <!-- Input Area -->
            <footer class="p-4 md:p-10 bg-white border-t border-[#FFD700]/20">
                <form id="chat-form" class="flex items-center gap-3 md:gap-6 bg-[#FFF8DC]/20 rounded-[2rem] md:rounded-[3rem] p-2 md:p-3 pr-3 md:pr-4 shadow-inner border border-[#FFD700]/20">
                    <input id="message-input" type="text" placeholder="Waiting for partner..." disabled class="flex-1 bg-transparent border-none focus:outline-none px-4 md:px-8 py-2 md:py-4 font-semibold placeholder-[#2C2C2C]/50 text-lg md:text-2xl">
                    <button type="submit" class="bg-[#FFD700] text-white hover:bg-[#DAA520] w-10 h-10 md:w-16 md:h-16 rounded-full flex items-center justify-center transition-all shadow-lg border-b-2 md:border-b-4 border-[#B8860B]">
                        🚀
                    </button>
                </form>
            </footer>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
